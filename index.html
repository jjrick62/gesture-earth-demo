<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http://localhost:8000; connect-src 'self' http://localhost:8000 https://cdn.jsdelivr.net; media-src 'self'; font-src 'self';">
  <title>Gesture Earth Demo</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 3D 地球 -->
  <div id="globe-container"></div>

  <!-- 摄像头实时画面小窗 -->
  <video id="camera-window" autoplay playsinline muted></video>

  <!-- 手势状态面板（摄像头上方，左下） -->
  <div id="gesture-panel">
    <div id="gesture-status">— 加载中...</div>
    <div id="gesture-action"></div>
    <div id="sensitivity-display"></div>
  </div>

  <!-- 手势提示面板（底部居中，初次加载显示） -->
  <div id="gesture-hint">
    <div>🖐 张开手掌移动 → 旋转地球 · 退出聚焦</div>
    <div>🤏 拇指食指捏合移动 → 缩放远近</div>
    <div>☝ 食指朝上 → 下一张卡片</div>
    <div>👇 食指朝下 → 上一张卡片</div>
    <div>✊ 握拳 → 暂停自转</div>
    <div style="margin-top:0.25rem;font-size:0.625rem;color:#555">+/- 调节灵敏度 · R 重置</div>
  </div>

  <!-- 底部状态栏 -->
  <div id="status-bar">
    <span id="camera-indicator">🟡 初始化中...</span>
    <span id="fps-display">—</span>
    <span id="error-msg" style="display:none"></span>
  </div>

  <!-- 加载遮罩 -->
  <div id="loading-overlay">
    <div>
      <p>Gesture Earth Demo</p>
      <p style="font-size:0.75rem;color:#666;margin-top:0.5rem">正在初始化...</p>
    </div>
  </div>

  <!-- 登录/注册浮层（搬自旅行相册） -->
  <div id="auth-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content" style="max-width:24rem">
      <div class="modal-header">
        <h2 id="auth-title">登录</h2>
        <button class="btn-close" id="btn-auth-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="auth-email">邮箱</label>
          <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="auth-password">密码</label>
          <input type="password" id="auth-password" placeholder="至少6位" autocomplete="current-password">
        </div>
        <div id="auth-error" style="color:#e55;font-size:0.75rem;margin-bottom:0.5rem;display:none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-text" id="btn-auth-switch" style="margin-right:auto">没有账号？注册</button>
        <button class="btn-primary" id="btn-auth-submit">登录</button>
      </div>
    </div>
  </div>

  <!-- 顶部按钮 -->
  <button id="btn-add" class="btn-add" title="添加地点">+</button>
  <button id="btn-overview" class="btn-overview" title="地点总览">☰</button>

  <!-- 添加/编辑地点浮层（搬自旅行相册） -->
  <div id="add-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>添加地点</h2>
        <button class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="city-search">地点</label>
          <div class="search-select">
            <input type="text" id="city-search" placeholder="搜索城市/地区（支持中英文）..." autocomplete="off">
            <div id="city-search-results" class="search-results"></div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="input-lat">纬度 Lat</label>
            <input type="number" id="input-lat" step="any" placeholder="31.2304">
          </div>
          <div class="form-group">
            <label for="input-lng">经度 Lng</label>
            <input type="number" id="input-lng" step="any" placeholder="121.4737">
          </div>
        </div>
        <div class="form-group">
          <label for="visit-date">访问日期</label>
          <input type="date" id="visit-date">
        </div>
        <div class="form-group">
          <label>评分</label>
          <div class="star-input" id="star-input">
            <span data-value="1">☆</span>
            <span data-value="2">☆</span>
            <span data-value="3">☆</span>
            <span data-value="4">☆</span>
            <span data-value="5">☆</span>
          </div>
        </div>
        <div class="form-group">
          <label for="place-notes">感想</label>
          <textarea id="place-notes" rows="3" placeholder="写点感想..."></textarea>
        </div>
        <div class="form-group">
          <label>照片</label>
          <div class="modal-photo-grid" id="modal-photo-grid"></div>
          <button id="btn-modal-add-photo" class="btn-text">+ 添加照片</button>
          <input type="file" id="modal-photo-input" accept="image/*" multiple hidden>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-outline" id="btn-delete-modal" style="margin-right:auto">删除</button>
        <button class="btn-secondary" id="btn-cancel-add">取消</button>
        <button class="btn-primary" id="btn-save-add">保存</button>
      </div>
    </div>
  </div>

  <!-- 地点总览 -->
  <div id="overview-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="overview-content">
      <div class="overview-header">
        <h2>地点总览</h2>
        <span id="overview-stats" class="overview-stats"></span>
        <button class="btn-close">&times;</button>
      </div>
      <div class="overview-body" id="overview-list"></div>
    </div>
  </div>

  <!-- 地点详情卡片（搬自旅行相册） -->
  <div id="detail-card" class="detail-card hidden">
    <div class="detail-header">
      <h2 id="detail-name"></h2>
      <button id="btn-close-detail" class="btn-close">&times;</button>
    </div>
    <div class="detail-body">
      <div class="detail-meta">
        <span id="detail-fullname" class="detail-fullname"></span>
        <span id="detail-date" class="detail-date"></span>
      </div>
      <div class="detail-stars" id="detail-stars"></div>
      <div class="detail-photos">
        <div class="photo-grid" id="photo-grid"></div>
        <button id="btn-add-photo" class="btn-text">+ 添加照片</button>
        <input type="file" id="photo-input" accept="image/*" multiple hidden>
      </div>
      <div class="detail-notes" id="detail-notes"></div>
    </div>
    <div class="detail-footer">
      <button id="btn-edit-place" class="btn-secondary">编辑</button>
      <button id="btn-delete-place" class="btn-outline">删除</button>
    </div>
  </div>

  <!-- 3D 地点悬浮卡片覆盖层 -->
  <svg id="connector-lines"></svg>
  <div id="place-cards"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="js/main.js"></script>
</body>
</html>
